global:
  hosts:
    domain: app.com
    externalIP: localhost
    externalUrl: http://localhost:8081
    http: localhost:8081
    https: false
  ingress:
    configureCertmanager: false
  kas:
    enabled: false
  rails:
    bootsnap:
      enabled: false
nginx-ingress:
  enabled: false
postgresql:
  resources:
    requests:
      memory: 200Mi
prometheus:
  install: false
redis:
  allowEmptyPassword: true
  password: ""
  resources:
    requests:
      memory: 100Mi
registry:
  enabled: false
  hpa:
    maxReplicas: 1
    minReplicas: 1

gitlab:
  gitlab-exporter:
    enabled: false
  gitlab-shell:
    maxReplicas: 1
    minReplicas: 1
  kas:
    maxReplicas: 1
    minReplicas: 1
  sidekiq:
    enabled: false
    maxReplicas: 1
    minReplicas: 1
    resources:
      requests:
        cpu: 60m
        memory: 300M
  toolbox:
    enabled: false
  webservice:
    maxReplicas: 1
    minReplicas: 1
    resources:
      requests:
        memory: 600M
    workerProcesses: 0

gitlab-runner:
  install: false

certmanager:
  install: false
  
certmanager-issuer:
  email: knism@student.42wolfsburg.de